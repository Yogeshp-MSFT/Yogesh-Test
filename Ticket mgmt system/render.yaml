databases:
  - name: ticketmgmt-db
    plan: free
    databaseName: ticketmgmt
    user: ticketmgmt_user

services:
  - type: web
    name: ticket-mgmt-system
    runtime: python
    plan: free
    buildCommand: cd rbac_project && chmod +x build.sh && ./build.sh
    startCommand: cd rbac_project && gunicorn rbac_project.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ticketmgmt-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.3"
